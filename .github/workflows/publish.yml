name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC, no NPM_TOKEN) needs npm >= 11.5.1;
      # don't rely on whatever version happens to ship with the Node
      # build setup-node resolves "22" to.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: git diff --exit-code -- dist
      - run: npm run typecheck
      - run: npm test
      - run: npm run golden
      - run: npm publish --provenance
